# Provisions dashboards from JSON files in /var/lib/grafana/dashboards.
# Files are loaded at startup and kept in sync; edits made in the UI to a
# provisioned dashboard can be saved but are overwritten on restart unless
# also written back to the JSON file.
apiVersion: 1

providers:
  - name: tactical-mesh
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
