# Provisioned Prometheus datasource.
# Fixed uid so dashboards can reference it stably across fresh Grafana volumes.
# Existing dashboards reference the datasource by name ("Prometheus"); the name
# here must stay "Prometheus" to keep those working.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: tactical-prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: true
