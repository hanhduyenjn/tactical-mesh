# Tactical-mesh per-node SNMP agent.
# Runs as a sidecar sharing each clab node's network namespace, so it answers
# on the node's mgmt IP (172.20.20.x:161). Read-only, IF-MIB only — this is a
# lab telemetry source, not a managed device.
#
# NOTE: net-snmp does NOT strip trailing inline comments on `view`/`rocommunity`
# directives — a "# ..." after the OID is parsed as the view mask and fails with
# "invalid MASK". Keep comments on their own lines.

# --- Access control -----------------------------------------------------------
# Read-only community "public", restricted to the `ifview` view below.
rocommunity public default -V ifview

# View definition. `view NAME included OID` — exposes:
#   .1.3.6.1.2.1.1   system   (sysUpTime etc., required by snmp_exporter)
#   .1.3.6.1.2.1.2   interfaces (ifTable)
#   .1.3.6.1.2.1.31  ifXTable  (ifHC* 64-bit counters, ifName)
view ifview included .1.3.6.1.2.1.1
view ifview included .1.3.6.1.2.1.2
view ifview included .1.3.6.1.2.1.31

# --- Agent identity -----------------------------------------------------------
sysLocation tactical-mesh-lab
sysContact nms@tactical-mesh.lab
sysServices 72
